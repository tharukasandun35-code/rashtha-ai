<script>
    async function generateVideo() {
        const promptText = document.getElementById('promptInput').value.trim();
        if (!promptText) { alert('කරුණාකර මොනවා හරි ලියන්න!'); return; }

        const btn = document.getElementById('generateBtn');
        const loading = document.getElementById('loadingText');
        const resultBox = document.getElementById('resultBox');

        btn.disabled = true;
        loading.style.display = 'block';
        resultBox.style.display = 'none';

        try {
            // මෙන්න මේ පේළිය අනිවාර්යයෙන්ම මාරු වෙන්න ඕනේ:
            const response = await fetch('https://tharukasandun35-rashtha-ai-backend.hf.space/generate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt: promptText })
            });

            if (!response.ok) throw new Error('Network error');

            const data = await response.json();
            
            if (data.reply) {
                // වීඩියෝ එකක් වෙනුවට පිළිතුර පෙන්වීමට
                document.getElementById('videoLink').innerText = data.reply;
                resultBox.style.display = 'block';
            } else {
                alert('පිළිතුරක් ලැබුණේ නැහැ!');
            }
        } catch (error) {
            console.error(error);
            alert('සර්වර් එක සමඟ සම්බන්ධ වීමට නොහැකි විය!');
        } finally {
            btn.disabled = false;
            loading.style.display = 'none';
        }
    }
</script>
