<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rashtha AI - Text to Video Generator</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background-color: #1e293b;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 600px;
            text-align: center;
        }
        h1 {
            color: #38bdf8;
            margin-bottom: 5px;
            font-size: 2.5rem;
        }
        p.subtitle {
            color: #94a3b8;
            margin-bottom: 25px;
        }
        textarea {
            width: 100%;
            height: 120px;
            padding: 15px;
            border-radius: 10px;
            border: 2px solid #334155;
            background-color: #0f172a;
            color: #fff;
            font-size: 16px;
            resize: none;
            box-sizing: border-box;
            margin-bottom: 20px;
        }
        textarea:focus {
            outline: none;
            border-color: #38bdf8;
        }
        button {
            background: linear-gradient(135deg, #38bdf8, #3b82f6);
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s, opacity 0.2s;
        }
        button:hover {
            opacity: 0.9;
        }
        button:active {
            transform: scale(0.98);
        }
        .result-box {
            margin-top: 25px;
            display: none;
        }
        .success-msg {
            color: #4ade80;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .video-btn {
            background: linear-gradient(135deg, #4ade80, #22c55e);
            display: inline-block;
            text-decoration: none;
            color: white;
            padding: 14px 25px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 10px;
            width: 100%;
            box-sizing: border-box;
            transition: transform 0.2s;
        }
        .video-btn:hover {
            transform: scale(1.02);
        }
        .loading {
            display: none;
            color: #e2e8f0;
            margin-top: 15px;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Rashtha AI ✨</h1>
        <p class="subtitle">සිංහල ප්‍රොම්ප්ට් එකෙන් තත්පර 20ක 1080p Full HD වීඩියෝ සාදන්න</p>
        
        <textarea id="promptInput" placeholder="ඔබට අවශ්‍ය වීඩියෝව ගැනසිංහලෙන් ලියන්න... (උදා: සිංහයෙක් කැලේක ඉන්නවා)"></textarea>
        
        <button id="generateBtn" onclick="generateVideo()">Generate 20s Video</button>
        
        <div id="loadingText" class="loading">⏳ Groq AI සිංහල තේරුම් ගනිමින් පවතී... කරුණාකර රැඳී සිටින්න...</div>

        <div id="resultBox" class="result-box">
            <p class="success-msg">ඔබේ වීඩියෝව සූදානම්! 🎉</p>
            <a id="videoLink" href="#" target="_blank" class="video-btn">🎬 වීඩියෝව මෙතනින් බලන්න (Click to Watch)</a>
        </div>
    </div>

    <script>
        // 🌟 මෙතන තිබ්බ def අයින් කරලා function කියලා නිවැරදි කරලා තියෙන්නේ බොසා
        async function generateVideo() {
            const promptText = document.getElementById('promptInput').value.trim();
            if (!promptText) {
                alert('කරුණාකර මොනවා හරි සිංහලෙන් ලියන්න!');
                return;
            }

            const btn = document.getElementById('generateBtn');
            const loading = document.getElementById('loadingText');
            const resultBox = document.getElementById('resultBox');

            btn.disabled = true;
            loading.style.display = 'block';
            resultBox.style.display = 'none';

            try {
                const response = await fetch('/generate-video', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ prompt: promptText })
                });

                const data = await response.json();
                
                if (data.status === 'success' && data.video_url) {
                    document.getElementById('videoLink').href = data.video_url;
                    resultBox.style.display = 'block';
                } else {
                    alert('වීඩියෝව සෑදීමේදී ගැටලුවක් මතු විය. නැවත උත්සාහ කරන්න.');
                }
            } catch (error) {
                console.error(error);
                alert('සර්වර් එක සමඟ සම්බන්ධ වීමට නොහැකි විය!');
            } finally {
                btn.disabled = false;
                loading.style.display = 'none';
            }
        }
    </script>

</body>
</html>
