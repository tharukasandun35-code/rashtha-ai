<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rashtha AI - AI Video Generator</title>
    <link rel="icon" href="https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/svg/2728.svg" type="image/svg+xml">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0f172a; color: #f8fafc; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .container { background-color: #1e293b; padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); width: 100%; max-width: 600px; text-align: center; }
        h1 { color: #38bdf8; margin-bottom: 5px; font-size: 2.5rem; }
        p.subtitle { color: #94a3b8; margin-bottom: 25px; }
        textarea { width: 100%; height: 120px; padding: 15px; border-radius: 10px; border: 2px solid #334155; background-color: #0f172a; color: #fff; font-size: 16px; resize: none; box-sizing: border-box; margin-bottom: 20px; }
        button { background: linear-gradient(135deg, #38bdf8, #3b82f6); color: white; border: none; padding: 14px 28px; font-size: 18px; font-weight: bold; border-radius: 10px; cursor: pointer; width: 100%; transition: transform 0.2s; }
        button:disabled { background: #475569; cursor: not-allowed; }
        .result-box { margin-top: 25px; display: none; background: #0f172a; padding: 15px; border-radius: 10px; text-align: center; }
        video { width: 100%; border-radius: 8px; margin-top: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .loading { display: none; color: #e2e8f0; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Rashtha AI ✨</h1>
        <p class="subtitle">ඔබට අවශ්‍ය වීඩියෝ එක සිංහලෙන් විස්තර කරන්න</p>
        
        <textarea id="promptInput" placeholder="උදා: ලස්සන ගඟක් සහ කැලෑවක්..."></textarea>
        <button id="generateBtn" onclick="generateResponse()">වීඩියෝව සාදන්න</button>
        
        <div id="loadingText" class="loading">⏳ Rashtha AI වීඩියෝව සකසමින් පවතිී...</div>

        <div id="resultBox" class="result-box">
            <p style="color: #4ade80; font-weight: bold;">✨ ඔබේ වීඩියෝව සූදානම්!</p>
            <video id="aiVideo" controls autoplay loop muted playsinline></video>
        </div>
    </div>

    <script>
        // ලංකාවේ කිසිම නෙට්වර්ක් එකකින් බ්ලොක් නොවන Google සර්වර්ස් වල තියෙන Direct MP4 ලින්ක්ස්
        const videoDatabase = {
            nature: "https://storage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4",
            river: "https://player.vimeo.com/external/371433846.sd.mp4?s=236da2f3c054ba2d11d1c9ccaf457102e21264c6&profile_id=139&oauth2_token_id=57447761",
            ocean: "https://storage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4",
            sky: "https://storage.googleapis.com/gtv-videos-bucket/sample/ForBiggerEscapes.mp4",
            forest: "https://storage.googleapis.com/gtv-videos-bucket/sample/ForBiggerFun.mp4",
            city: "https://storage.googleapis.com/gtv-videos-bucket/sample/ForBiggerJoyrides.mp4",
            space: "https://storage.googleapis.com/gtv-videos-bucket/sample/SubaruOutbackOnStreetAndDirt.mp4"
        };

        async function generateResponse() {
            const promptInput = document.getElementById('promptInput');
            const btn = document.getElementById('generateBtn');
            const loading = document.getElementById('loadingText');
            const resultBox = document.getElementById('resultBox');
            const aiVideo = document.getElementById('aiVideo');

            const promptText = promptInput.value.trim().toLowerCase();
            if (!promptText) { 
                alert('කරුණාකර වීඩියෝව සඳහා විස්තරයක් ලියන්න!'); 
                return; 
            }

            btn.disabled = true;
            loading.style.display = 'block';
            resultBox.style.display = 'none';

            // සැබෑ AI එකක් වගේ පේන්න තත්පර 1.5ක බොරු Delay එකක් ගන්නවා
            await new Promise(resolve => setTimeout(resolve, 1500));

            try {
                let selectedVideo = videoDatabase.nature; // Default

                if (promptText.includes('ගඟ') || promptText.includes('river') || promptText.includes('වතුර')) {
                    selectedVideo = videoDatabase.river;
                } else if (promptText.includes('මුහුද') || promptText.includes('ocean') || promptText.includes('වෙරළ')) {
                    selectedVideo = videoDatabase.ocean;
                } else if (promptText.includes('අහස') || promptText.includes('sky') || promptText.includes('වලාකුළු')) {
                    selectedVideo = videoDatabase.sky;
                } else if (promptText.includes('කැලෑ') || promptText.includes('forest') || promptText.includes('ගස්') || promptText.includes('ලස්සන')) {
                    selectedVideo = videoDatabase.forest;
                } else if (promptText.includes('නගර') || promptText.includes('city') || promptText.includes('පාර')) {
                    selectedVideo = videoDatabase.city;
                } else if (promptText.includes('අවකාශ') || promptText.includes('space') || promptText.includes('තරු')) {
                    selectedVideo = videoDatabase.space;
                }

                aiVideo.src = selectedVideo;
                resultBox.style.display = 'block';
                aiVideo.load();

                // බ්‍රවුසර් එකෙන් Auto-play Block කරන එක වැළැක්වීමට බල කිරීමක් (Force Play)
                const playPromise = aiVideo.play();
                if (playPromise !== undefined) {
                    playPromise.catch(error => {
                        console.log("Playback interrupted, loaded via controls.");
                    });
                }

            } catch (error) {
                aiVideo.src = videoDatabase.nature;
                resultBox.style.display = 'block';
                aiVideo.load();
            } finally {
                btn.disabled = false;
                loading.style.display = 'none';
            }
        }
    </script>
</body>
</html>
