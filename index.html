<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <title>Rashtha AI</title>
    <style>
        body { background-color: #0f172a; color: #fff; font-family: sans-serif; display: flex; justify-content: center; padding: 50px; }
        .container { width: 100%; max-width: 500px; text-align: center; }
        textarea { width: 100%; height: 100px; margin-bottom: 10px; }
        button { background: #38bdf8; padding: 10px 20px; border: none; cursor: pointer; }
        #result { margin-top: 20px; white-space: pre-wrap; color: #4ade80; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Rashtha AI ✨</h1>
        <textarea id="prompt" placeholder="ඔබේ ප්‍රශ්නය සිංහලෙන් ලියන්න..."></textarea>
        <button onclick="getAI()">Generate</button>
        <div id="result"></div>
    </div>

    <script>
        async function getAI() {
            const prompt = document.getElementById('prompt').value;
            const resDiv = document.getElementById('result');
            resDiv.innerText = "සිතමින් පවතී...";
            
            try {
                // මෙතන තමයි Hugging Face Backend ලින්ක් එක දාලා තියෙන්නේ
                const response = await fetch('https://tharukasandun35-rashtha-ai-backend.hf.space/generate', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ prompt: prompt })
                });
                const data = await response.json();
                resDiv.innerText = data.reply;
            } catch (e) {
                resDiv.innerText = "Error: සර්වර් එකට සම්බන්ධ වීමට බැරි වුණා.";
            }
        }
    </script>
</body>
</html>
