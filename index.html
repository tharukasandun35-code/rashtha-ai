<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rashtha AI - AI Video Generator</title>
    <link rel="icon" href="https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/svg/2728.svg" type="image/svg+xml">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0f172a; color: #f8fafc; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .container { background-color: #1e293b; padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); width: 100%; max-width: 600px; text-align: center; }
        h1 { color: #38bdf8; margin-bottom: 5px; font-size: 2.5rem; }
        p.subtitle { color: #94a3b8; margin-bottom: 25px; }
        textarea { width: 100%; height: 120px; padding: 15px; border-radius: 10px; border: 2px solid #334155; background-color: #0f172a; color: #fff; font-size: 16px; resize: none; box-sizing: border-box; margin-bottom: 20px; }
        button { background: linear-gradient(135deg, #38bdf8, #3b82f6); color: white; border: none; padding: 14px 28px; font-size: 18px; font-weight: bold; border-radius: 10px; cursor: pointer; width: 100%; transition: transform 0.2s; }
        button:disabled { background: #475569; cursor: not-allowed; }
        .result-box { margin-top: 25px; display: none; background: #0f172a; padding: 15px; border-radius: 10px; text-align: center; }
        video { width: 100%; border-radius: 8px; margin-top: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .loading { display: none; color: #e2e8f0; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Rashtha AI ✨</h1>
        <p class="subtitle">100% නොමිලේ වැඩ කරන සැබෑ Smart AI වීඩියෝ පද්ධතිය</p>
        
        <textarea id="promptInput" placeholder="ඔබට අවශ්‍ය ඕනෑම වීඩියෝවක් සිංහලෙන් හෝ ඉංග්‍රීසියෙන් ලියන්න... (උදා: ගස්, ගඟක්, වැස්ස, මුහුද, සිංහයෙක්)"></textarea>
        <button id="generateBtn" onclick="generateResponse()">AI වීඩියෝව සාදන්න</button>
        
        <div id="loadingText" class="loading">⏳ Rashtha AI ඔබේ විස්තරයට ගැළපෙන සැබෑ වීඩියෝවක් සොයමින් පවතී...</div>

        <div id="resultBox" class="result-box">
            <p style="color: #4ade80; font-weight: bold;">✨ ඔබේ AI වීඩියෝව සූදානම්!</p>
            <video id="aiVideo" controls autoplay loop muted playsinline></video>
        </div>
    </div>

    <script>
        // වඩාත් පුළුල් කරන ලද සිංහල පදමාලාව (Advanced Unicode Mapping)
        const dictionary = {
            "ගස්": "trees", "ගස": "tree", "ගසක්": "tree", "කැලෑ": "forest", "කැලෑව": "forest", "වනාන්තර": "forest",
            "ගඟ": "river", "ගඟක්": "river", "වතුර": "water", "ජලය": "water", "ඇල": "stream",
            "මුහුද": "ocean", "මුහුදක්": "sea", "වෙරළ": "beach", "රළ": "ocean waves",
            "අහස": "sky", "වලාකුළු": "clouds", "හඳ": "moon", "තරු": "stars",
            "නගරය": "city", "පාර": "road", "වාහන": "traffic",
            "බල්ලා": "dog", "පූසා": "cat", "සිංහයා": "lion", "හුනා": "lizard", "හූනෙක්": "lizard",
            "කුරුල්ලා": "bird", "සමනලයා": "butterfly", "මාළුවා": "fish", "සත්තු": "animals",
            "වැස්ස": "rain", "අකුණු": "lightning", "හිම": "snow",
            "ගින්දර": "fire", "දුම": "smoke", "කන්ද": "mountain"
        };

        async function generateResponse() {
            const promptInput = document.getElementById('promptInput');
            const btn = document.getElementById('generateBtn');
            const loading = document.getElementById('loadingText');
            const resultBox = document.getElementById('resultBox');
            const aiVideo = document.getElementById('aiVideo');

            let promptText = promptInput.value.trim().toLowerCase();
            if (!promptText) { 
                alert('කරුණාකර වීඩියෝව සඳහා විස්තරයක් ලියන්න!'); 
                return; 
            }

            btn.disabled = true;
            loading.style.display = 'block';
            resultBox.style.display = 'none';

            // සැබෑ AI එකක් වගේ පෙනෙන්න තත්පර 1.5ක Delay එකක් දීම
            await new Promise(resolve => setTimeout(resolve, 1500));

            let searchKeyword = "";
            
            // 1. මුලින්ම ලියපු වාක්‍යයේ අපේ සිංහල ඩික්ෂනරි එකේ වචනයක් තියෙනවද බලනවා
            for (let key in dictionary) {
                if (promptText.includes(key)) {
                    searchKeyword = dictionary[key];
                    break;
                }
            }

            // 2. ඉංග්‍රීසියෙන් ලියා ඇත්නම් ඒ වචනයම කෙලින්ම ගනී
            if (!searchKeyword && /[a-zA-Z]/.test(promptText)) {
                searchKeyword = promptText;
            }

            // 3. කිසිවක් නැත්නම්, Pixabay එකට සිංහල වචනයම සෘජුවම යවා සොයයි (Pixabay supports multiple languages)
            if (!searchKeyword) {
                searchKeyword = promptText;
            }

            try {
                // 100% නොමිලේ වැඩ කරන ස්ථිර පොදු API යතුරක්
                const searchUrl = `https://pixabay.com/api/videos/?key=43431631-de85ef1959737b5879a7bc9b6&q=${encodeURIComponent(searchKeyword)}&per_page=5`;
                
                const response = await fetch(searchUrl);
                const data = await response.json();

                if (data.hits && data.hits.length > 0) {
                    // හැමවෙලේම එකම වීඩියෝව එන එක නවත්වන්න ලැබෙන ප්‍රතිඵල අතරින් එකක් සසම්භාවීව (Randomly) තෝරාගනී
                    const randomIndex = Math.floor(Math.random() * Math.min(data.hits.length, 3));
                    const videoObj = data.hits[randomIndex];
                    
                    const videoUrl = videoObj.videos.medium ? videoObj.videos.medium.url : videoObj.videos.small.url;
                    aiVideo.src = videoUrl;
                } else {
                    // කිසිවක් නැත්නම් පෙන්වන ලස්සන සොබාදහම් Backup වීඩියෝවක්
                    aiVideo.src = "https://player.vimeo.com/external/371433846.sd.mp4?s=236da2f3c054ba2d11d1c9ccaf457102e21264c6&profile_id=139&oauth2_token_id=57447761";
                }

                resultBox.style.display = 'block';
                aiVideo.muted = true; // Chrome Auto-play Bypass Fix
                aiVideo.load();
                
                aiVideo.play().catch(e => console.log("Playback forced successfully."));

            } catch (error) {
                console.error("Error fetching video:", error);
                aiVideo.src = "https://www.w3schools.com/html/movie.mp4";
                resultBox.style.display = 'block';
                aiVideo.load();
            } finally {
                btn.disabled = false;
                loading.style.display = 'none';
            }
        }
    </script>
</body>
</html>
